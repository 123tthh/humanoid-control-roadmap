seed: 1
num_steps_per_env: 24
max_iterations: 30000
obs_groups:
  actor: !!python/tuple
  - policy
  critic: !!python/tuple
  - critic
save_interval: 500
experiment_name: g1_hw6_teacher
run_name: accad_walk_pretrained
logger: tensorboard
wandb_project: humanoid_hw6
wandb_tags: !!python/tuple
- humanoid_hw6
- teacher
- privileged
resume: false
load_run: .*
load_checkpoint: model_.*.pt
clip_actions: null
upload_model: true
class_name: OnPolicyRunner
actor:
  hidden_dims: !!python/tuple
  - 512
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
  distribution_cfg:
    init_std: 1.0
    std_type: log
  motion_obs_dim: 1344
  motion_steps: 21
  proprio_obs_dim: 93
  history_steps: 10
  motion_latent_dim: 64
  history_latent_dim: 128
  motion_conv_channels: &id001 !!python/tuple
  - 48
  - 24
  motion_conv_kernel_sizes: &id002 !!python/tuple
  - 6
  - 4
  motion_conv_strides: &id003 !!python/tuple
  - 2
  - 2
  history_conv_channels: !!python/tuple
  - 64
  - 32
  history_conv_kernel_sizes: !!python/tuple
  - 4
  - 2
  history_conv_strides: !!python/tuple
  - 2
  - 1
  layer_norm: true
critic:
  hidden_dims: !!python/tuple
  - 512
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
  motion_obs_dim: 1344
  motion_steps: 21
  motion_latent_dim: 64
  motion_conv_channels: *id001
  motion_conv_kernel_sizes: *id002
  motion_conv_strides: *id003
  layer_norm: true
algorithm:
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.005
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  optimizer: adam
  rnd_cfg: null
  symmetry_cfg: null
upload_model_mode: rolling_latest
multi_gpu: null
